<style>
  :root {
    --pastel-pink: #FFB7C5;
    --pastel-blue: #A0E7FF;
    --pastel-purple: #E0BBE4;
    --pastel-yellow: #FFF9C4;
    --accent-pink: #FF85A2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }

  body {
    background-color: #fafafa;
    background-image: radial-gradient(var(--pastel-blue) 1px, transparent 1px);
    background-size: 20px 20px;
    color: #444;
    overflow-x: hidden;
  }

  nav {
    background: white;
    border-bottom: 2px solid var(--pastel-pink);
    position: sticky;
    top: 0;
    z-index: 2000;
  }

  .nav-content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo-link {
    display: flex;
    align-items: center;
    text-decoration: none;
    gap: 10px;
  }
  .nav-logo-img {
    height: 32px;
    width: auto;
    object-fit: contain;
  }
  .nav-title { font-weight: bold; color: var(--accent-pink); font-size: 1.2rem; }

  .hamburger {
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 10px;
  }
  .hamburger span { width: 25px; height: 3px; background: var(--accent-pink); border-radius: 2px; }

  .menu-drawer {
    position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
    background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1);
    z-index: 3000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 40px 20px;
  }
  .menu-drawer.active { right: 0; }
  .menu-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 2500; display: none;
  }
  .menu-drawer a {
    display: block; width: 100%; padding: 12px; margin-bottom: 10px;
    text-decoration: none; color: #444; font-weight: bold;
    border: 1px solid #eee; border-radius: 8px; text-align: left;
  }

  .app-container {
    max-width: 1100px;
    margin: 30px auto;
    padding: 0 15px;
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 30px;
  }

  .preview-label {
    display: block;
    text-align: center;
    font-size: 0.9rem;
    font-weight: bold;
    color: var(--accent-pink);
    margin-top: 8px;
  }

  @media (max-width: 900px) {
    .app-container { grid-template-columns: 1fr; margin-top: 15px; }
    .nav-title { font-size: 1rem; }
    .nav-content { padding: 8px 15px; }

    body.has-image .main-content {
      position: sticky;

      z-index: 1000;
      background: rgba(250, 250, 250, 0.95);
      padding: 10px 0;
      border-bottom: 1px solid var(--pastel-pink);
    }
    
    body.has-image .main-content .card {
      margin-bottom: 0;
      padding: 5px;
      box-shadow: none;
      background: transparent;
      border: none;
    }

    body.has-image .card-header { display: none; }

    body.has-image .preview-result-group {
      display: flex;
      justify-content: center;
      gap: 15px;
      align-items: flex-start;
    }

    body.has-image .preview-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body.has-image .preview-wrapper, 
    body.has-image #resultImg {

    .download-link-box .btn-main { padding: 8px; font-size: 0.8rem; }

  .card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    border: 1px solid #eee;

  .card-header { font-weight: 800; color: var(--accent-pink); margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }

  .preview-wrapper {
    background: #f0f0f0;
    border-radius: 12px;
    aspect-ratio: 1/1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    border: 2px dashed #ddd;
    cursor: pointer;
  }
  canvas { max-width: 100%; height: auto; display: none; }

  .control-item { margin-bottom: 18px; }
  .label-group { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.85rem; font-weight: bold; color: #666; }
  
  input[type=range] { width: 100%; height: 6px; border-radius: 3px; accent-color: var(--accent-pink); cursor: pointer; }

  .btn-main {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: var(--accent-pink); color: white; font-weight: bold;
    cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 133, 162, 0.3);
  }
  .btn-main:disabled { background: #ccc; box-shadow: none; }
  
  .btn-secondary {
    width: 100%; padding: 10px; border-radius: 12px; border: 1px solid #ddd;
    background: white; color: #666; font-weight: bold; margin-top: 10px;
    cursor: pointer; transition: 0.2s;
  }
  .btn-secondary:hover { background: #f9f9f9; }

  #cropModal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    z-index: 4000; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-content-crop { background: white; padding: 20px; border-radius: 16px; max-width: 500px; width: 100%; }
  .crop-box { max-height: 350px; margin-bottom: 15px; overflow: hidden; }

  .radio-pill { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; background: #eee; padding: 4px; border-radius: 10px; }
  .radio-pill label { text-align: center; padding: 6px; font-size: 0.85rem; border-radius: 7px; cursor: pointer; }
  .radio-pill input:checked + label { background: white; color: var(--accent-pink); }
  .radio-pill input { display: none; }

  #resultImg { 
    width: 100%; 
    border-radius: 12px; 
    border: 2px solid var(--pastel-pink); 
    display: none; 
    cursor: zoom-in; 
  }

  .modal {
    display: none; 
    position: fixed;
    z-index: 5000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.95);
    cursor: zoom-out;
    -webkit-tap-highlight-color: transparent;
  }
  .modal-content {
    margin: auto;
    display: block;
    width: auto;
    max-width: 90%;
    max-height: 80%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    position: absolute;

  .modal-caption {
    position: absolute;
    bottom: 5%;
    width: 100%;
    text-align: center;
    color: #ccc;
    font-size: 0.9rem;
  }

<div class="menu-overlay" onclick="toggleMenu(false)"></div>
<div class="menu-drawer" id="drawer">

  <a href="https://9am-lab.github.io/fan-leave-kit/" target="_blank">粉絲請假卡</a>

<div class="app-container">
  <div class="main-content">
    <div class="preview-result-group">
      <div class="card" id="previewCard">
        <div class="card-header">🖼️ 圖片預覽 (點擊框內上傳)</div>
        <div class="preview-container">
          <div class="preview-wrapper" onclick="document.getElementById('fileInput').click()">
            <div id="placeholder">請點擊此處上傳圖片</div>
            <canvas id="previewCanvas"></canvas>
          </div>
          <span class="preview-label" id="labelPreview" style="display:none">預覽</span>
        </div>
      </div>

      <div class="card" id="resultCard" style="display:none">
        <div class="card-header">✨ 生成結果</div>
        <div class="preview-container">
          <img id="resultImg" alt="Generated GIF" onclick="openImageInNewTab()">
          <span class="preview-label" id="labelResult">生成結果 <span style="font-size: 0.7rem; font-weight: normal;">(點擊放大)</span></span>
        </div>
        <div class="download-link-box">
          <a id="downloadBtn" download="poke-face.gif" style="text-decoration:none">
            <button class="btn-main" style="margin-top:10px">💾 下載 GIF</button>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="side-panel">
    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <div class="card">
      <div class="card-header">⚙️ 效果設定：手部編輯</div>
      
      <div class="control-item">
        <div class="label-group"><span>手部模式</span></div>
        <div class="radio-pill">
          <input type="radio" id="hBoth" name="hMode" value="both" checked><label for="hBoth">雙手</label>
          <input type="radio" id="hLeft" name="hMode" value="left"><label for="hLeft">左手</label>
          <input type="radio" id="hRight" name="hMode" value="right"><label for="hRight">右手</label>
        </div>
      </div>

      <div class="control-item">
        <div class="label-group"><span>水平位置</span><span id="vX">0</span></div>
        <input type="range" id="offsetX" min="-50" max="150" value="0">
      </div>

      <div class="control-item">
        <div class="label-group"><span>垂直位置</span><span id="vY">50%</span></div>
        <input type="range" id="offsetY" min="0" max="100" value="50">
      </div>

      <div class="control-item">
        <div class="label-group"><span>旋轉角度</span><span id="vRot">0°</span></div>
        <input type="range" id="rotate" min="-90" max="90" value="0">
      </div>

      <div class="control-item">
        <div class="label-group"><span>手指大小</span><span id="vSize">80px</span></div>
        <input type="range" id="fSize" min="40" max="150" value="80">
      </div>
    </div>

    <div class="card">
      <div class="card-header">🎨 效果設定：圖片編輯</div>
      
      <div class="control-item">
        <div class="label-group"><span>戳戳頻率 (速度)</span><span id="vSpeed">1x</span></div>
        <input type="range" id="speed" min="0.5" max="4" step="0.1" value="1">
      </div>

      <div class="control-item">
        <div class="label-group"><span>擠壓與震動幅度</span><span id="vSquish">15%</span></div>
        <input type="range" id="squishAmt" min="0" max="50" step="1" value="15">
      </div>
    </div>

    <button id="genBtn" class="btn-main" disabled onclick="generateGif()">🎨 生成 GIF</button>
    <button class="btn-secondary" onclick="location.reload()">🔄 重新開始</button>
    
    <div id="loading" style="display:none; text-align:center; margin-top:10px; color:var(--accent-pink); font-weight:bold">
      處理中... <span id="progress">0%</span>
    </div>
  </div>
</div>

<div id="cropModal">
  <div class="modal-content-crop">
    <h3 style="margin-bottom:15px">裁切圖片範圍</h3>
    <div class="crop-box"><img id="cropImg"></div>
    <button class="btn-main" onclick="applyCrop()">確認裁切</button>
  </div>
</div>

<div id="imageModal" class="modal" onclick="closeModal()">
  <span class="close-modal">&times;</span>
  <img class="modal-content" id="modalImg" onclick="event.stopPropagation()">
  <div class="modal-caption">長按圖片可儲存至相簿 / 點擊空白處關閉</div>
</div>

<script>
let userImg = null;
let cropper = null;
let animReq = null;
let originalFileName = "pokepoke.gif";
let currentGifDataUrl = null; 

const canvas = document.getElementById('previewCanvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

function toggleMenu(open) {
  document.getElementById('drawer').classList.toggle('active', open);
  document.querySelector('.menu-overlay').style.display = open ? 'block' : 'none';
}

function openImageInNewTab() {
  if (currentGifDataUrl) {
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImg");
    modal.style.display = "block";
    modalImg.src = currentGifDataUrl;
    document.body.style.overflow = "hidden";
  }
}

function closeModal() {
  document.getElementById("imageModal").style.display = "none";
  document.body.style.overflow = "auto";
}

const fileInput = document.getElementById('fileInput');
fileInput.onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  
  const nameParts = file.name.split('.');
  if (nameParts.length > 1) nameParts.pop();
  originalFileName = nameParts.join('.') + "_pokepoke.gif";

  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('cropImg').src = ev.target.result;
    document.getElementById('cropModal').style.display = 'flex';
    if(cropper) cropper.destroy();
    cropper = new Cropper(document.getElementById('cropImg'), { aspectRatio: 1, viewMode: 1 });
  };
  reader.readAsDataURL(file);
};

function applyCrop() {
  const c = cropper.getCroppedCanvas({ width: 400, height: 400 });
  userImg = new Image();
  userImg.onload = () => {
    document.getElementById('placeholder').style.display = 'none';
    canvas.style.display = 'block';
    document.getElementById('labelPreview').style.display = 'block';
    document.getElementById('genBtn').disabled = false;
    document.getElementById('body').classList.add('has-image');
    startPreview();
  };
  userImg.src = c.toDataURL();
  document.getElementById('cropModal').style.display = 'none';
}

function getSettings() {
  return {
    mode: document.querySelector('input[name="hMode"]:checked').value,
    speed: parseFloat(document.getElementById('speed').value),
    squish: parseFloat(document.getElementById('squishAmt').value) / 100,
    x: parseInt(document.getElementById('offsetX').value),
    y: parseInt(document.getElementById('offsetY').value) / 100,
    rot: parseInt(document.getElementById('rotate').value) * Math.PI / 180,
    size: parseInt(document.getElementById('fSize').value)
  };
}

const sync = (id, vid, unit="") => {
  const el = document.getElementById(id);
  el.oninput = () => document.getElementById(vid).innerText = el.value + unit;
};
sync('speed', 'vSpeed', 'x');
sync('squishAmt', 'vSquish', '%');
sync('offsetX', 'vX');
sync('offsetY', 'vY', '%');
sync('rotate', 'vRot', '°');
sync('fSize', 'vSize', 'px');

function draw(prog, tCtx, tCanvas) {
  if(!userImg) return;
  const s = getSettings();
  const W = 400, H = 400;
  tCanvas.width = W; tCanvas.height = H;

  const bounce = Math.sin(prog * Math.PI * 2) * 0.5 + 0.5; 
  const currentSquish = 1 - (bounce * s.squish);
  
  const shakeIntensity = bounce * s.squish * 15; 
  const shakeX = Math.sin(prog * Math.PI * 20) * shakeIntensity;
  const shakeRot = Math.cos(prog * Math.PI * 15) * (s.squish * 0.15); 

  tCtx.clearRect(0,0,W,H);
  
  tCtx.save();
  tCtx.translate(W/2 + shakeX, H/2);
  tCtx.rotate(shakeRot);
  tCtx.scale(currentSquish, 1);
  tCtx.drawImage(userImg, -W/2, -H/2, W, H);
  tCtx.restore();

  const renderHand = (side) => {
    if(s.mode !== 'both' && s.mode !== side) return;
    const isL = side === 'left';
    tCtx.save();
    const hX = isL ? (s.x - 10 + bounce*35) : (W - s.x + 10 - bounce*35);
    const hY = s.y * H;
    tCtx.translate(hX, hY);
    tCtx.rotate(isL ? s.rot : -s.rot);
    tCtx.font = `${s.size}px serif`;
    tCtx.textAlign = 'center';
    tCtx.textBaseline = 'middle';
    tCtx.fillText(isL ? '👉' : '👈', 0, 0);
    tCtx.restore();
  };

  renderHand('left');
  renderHand('right');
}

function startPreview() {
  if(animReq) cancelAnimationFrame(animReq);
  const loop = (time) => {
    const s = getSettings();
    const duration = 1000 / s.speed;
    const prog = (time % duration) / duration;
    draw(prog, ctx, canvas);
    animReq = requestAnimationFrame(loop);
  };
  animReq = requestAnimationFrame(loop);
}

async function generateGif() {
  const s = getSettings();
  const genBtn = document.getElementById('genBtn');
  const loader = document.getElementById('loading');
  const progText = document.getElementById('progress');

  genBtn.disabled = true;
  loader.style.display = 'block';
  progText.innerText = "0%";

  try {
    const resp = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js');
    const workerBlob = await resp.blob();
    const workerUrl = URL.createObjectURL(workerBlob);

    const gif = new GIF({
      workers: 2,
      quality: 10,
      width: 400,
      height: 400,
      workerScript: workerUrl
    });

    const duration = 1000 / s.speed;
    const frameDelay = Math.max(33, 40 / s.speed);
    const totalFrames = Math.floor(duration / frameDelay);

    for(let i=0; i<totalFrames; i++) {
      const tmpC = document.createElement('canvas');
      tmpC.width = 400; tmpC.height = 400;
      const tmpCtx = tmpC.getContext('2d');
      draw(i/totalFrames, tmpCtx, tmpC);
      gif.addFrame(tmpC, {delay: frameDelay, copy: true});
    }

    gif.on('progress', p => {
      progText.innerText = Math.round(p * 100) + "%";
    });

    gif.on('finished', (blob) => {
      // 重點優化：將生成的 Blob 包裝成正確的 MIME 類型後轉為 Data URL
      const gifBlob = new Blob([blob], { type: 'image/gif' });
      const reader = new FileReader();
      
      reader.onloadend = () => {
        const base64data = reader.result;
        currentGifDataUrl = base64data; 
        
        const resImg = document.getElementById('resultImg');
        const downloadBtn = document.getElementById('downloadBtn');
        
        // 更新 UI
        resImg.src = base64data;
        resImg.style.display = 'block';
        
        // 更新下載連結
        downloadBtn.href = base64data;
        downloadBtn.download = originalFileName; 
        
        document.getElementById('resultCard').style.display = 'block';
        
        if(window.innerWidth > 900) {
          document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
        }

        genBtn.disabled = false;
        loader.style.display = 'none';
        URL.revokeObjectURL(workerUrl);
      };
      
      reader.readAsDataURL(gifBlob);
    });

    gif.render();
  } catch(e) {
    console.error(e);
    alert("GIF 生成失敗，請檢查網路連線後重試。");
    genBtn.disabled = false;
    loader.style.display = 'none';
  }
}
</script>
</body>
